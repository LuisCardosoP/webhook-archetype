spring:
  application:
    name: webhook-sms-api

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

server:
  port: 8239
  servlet:
    context-path: /webhook-sms

logging:
  level:
    com.familia: DEBUG

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER}

webhook:
  secret: ${WEBHOOK_SECRET}
